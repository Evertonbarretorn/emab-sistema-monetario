<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu de Vendas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="stylePainel.css">

</head>
<body>

<!-- 🔥 MENU DA ESCOLA (NOVO) -->
<div class="topo-escola">

    <img src="img/logo-escola.png" alt="Logo da Escola" class="logo-escola">

    <div>
        <h1>Sistema Monetário</h1>
        <p>Educação Financeira na Prática</p>
    </div>
    
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div class="checkout-container">

    <div class="top-banner">
        2. PÁGINA DE CAIXA
    </div>

    <div class="content-body">
        <div class="painel-grid">

            <!-- LADO ESQUERDO -->
            <div class="resumo-box">

                <h3 class="titulo-box">
                    Resumo Financeiro
                </h3>

                <div class="input-group-saldo">
                    <label>Saldo Inicial</label>
                    <input type="text"
                           id="saldoInicialInput"
                           value="500,00"
                           readonly>
                </div>

                <div class="cards-resume">

                    <div class="card-custom">
                        <div class="card-custom-title">
                            Total Gasto
                        </div>

                        <div class="card-custom-value value-spent"
                             id="totalGasto">
                            0,00
                        </div>
                    </div>

                    <div class="card-custom">
                        <div class="card-custom-title">
                            Saldo Restante
                        </div>

                        <div class="card-custom-value value-remaining"
                             id="saldo">
                            500,00
                        </div>
                    </div>

                </div>

                <div class="total-general">
                    <div class="total-label">
                        TOTAL GASTO
                    </div>

                    <div class="total-value"
                         id="totalGastoFinal">
                        0,00
                    </div>
                </div>

                <button class="btn-save-custom"
                        onclick="salvarMenu()">
                    SALVAR MENU DE VENDAS
                </button>

            </div>

            <!-- LADO DIREITO -->
            <div class="produtos-box">

                <div class="products-section-title">
                    🛒 PRODUTOS PARA REVENDA
                </div>

                <div id="listaCarrinho"></div>

            </div>

        </div>
    </div>

</div>

<div id="gridProdutos" class="container mt-4 d-none"></div>

<script src="scriptPainel.js"></script>
</body>
</html>
