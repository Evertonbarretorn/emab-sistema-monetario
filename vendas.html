<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Vendas</title>

<link rel="stylesheet" href="styleVendas.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔥 MENU NOVO -->
<div class="topo-escola">

    <img src="img/logo-escola.png" class="logo-escola">

    <div class="topo-texto">
        <h1>Sistema Monetário</h1>
        <p>Educação Financeira na Prática</p>
    </div>

    <button class="btn-historico"
            onclick="window.location.href='historico.html'">
        Histórico
    </button>

</div>

<!-- LAYOUT PDV -->
<div class="container-pdv">

        <!-- PRODUTOS -->
    <div class="panel">

        <h3>Produtos Disponíveis</h3>

        <div id="gridProdutosContainer">
            <!-- JS -->
        </div>

    </div>

<!-- CARRINHO -->
    <div class="panel">
        <h3>Carrinho</h3>

        <div id="cartContainer"></div>

        <input type="number" id="valorDigitado" placeholder="Valor total">

        <div id="resultadoVerificacao"></div>

        <button class="verificarValor" onclick="verificarValor()">
            Verificar valor
        </button>

        <button class="finalizar-btn" onclick="finalizarCompra()">
            Finalizar compra
        </button>
    </div>

    <!-- PAGAMENTO -->
    <div class="panel payment-panel">

        <h3>Pagamento</h3>

        <div class="payment-box">

            <div class="row">
                <span>Total</span>
                <strong id="totalPagar">0,00</strong>
            </div>

            <div class="row">
                <span>Recebido</span>
                <input type="number" id="valorRecebido">
            </div>

            <div class="row">
                <span>Troco</span>
                <strong id="troco">0,00</strong>
            </div>

            <div id="msgTroco"></div>

            <div class="acoes-troco">

                <button class="verify-btn" onclick="verificarTroco()">
                    Confirmar
                </button>

                <button class="limpar-troco-btn" onclick="limparTroco()">
                    Limpar
                </button>

            </div>

            <!-- CÉDULAS -->
           <!-- CÉDULAS -->
                <div class="section-title">Cédulas</div>

                <div class="money-grid-notas">
                    <div class="money-item note-2" onclick="adicionarTroco(2)">R$2</div>
                    <div class="money-item note-5" onclick="adicionarTroco(5)">R$5</div>
                    <div class="money-item note-10" onclick="adicionarTroco(10)">R$10</div>
                    <div class="money-item note-20" onclick="adicionarTroco(20)">R$20</div>
                    <div class="money-item note-50" onclick="adicionarTroco(50)">R$50</div>
                    <div class="money-item note-100" onclick="adicionarTroco(100)">R$100</div>
                </div>

                <!-- MOEDAS -->
                <div class="section-title">Moedas</div>

                <div class="money-grid-moedas">
                    <div class="money-item coin c5" onclick="adicionarTroco(0.05)">5c</div>
                    <div class="money-item coin c10" onclick="adicionarTroco(0.10)">10c</div>
                    <div class="money-item coin c25" onclick="adicionarTroco(0.25)">25c</div>
                    <div class="money-item coin c50" onclick="adicionarTroco(0.50)">50c</div>
                    <div class="money-item coin c1" onclick="adicionarTroco(1)">R$1</div>
                </div>

                <button class="finalizar-btn" onclick="finalizarVenda()">
                    Finalizar Venda
                </button>

        </div>
    </div>

</div>

<script src="scriptVendas.js"></script>
</body>
</html>
